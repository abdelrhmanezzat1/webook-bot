<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Webook Bot Pro - حجز تذاكر احترافي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <style>
        body { background: #1a1a2e; color: #eee; }
        .card { background: #16213e; border: none; margin-bottom: 20px; }
        .log-container { height: 300px; overflow-y: scroll; background: #0f0f1a; font-family: monospace; font-size: 12px; }
        .log-success { color: #0f0; }
        .log-error { color: #f44; }
        .log-info { color: #0af; }
        .btn-primary { background: #e94560; border: none; }
        .badge-hold { background: #ff9800; }
        .account-row { background: #0f3460; margin-bottom: 8px; padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container py-4">
    <h1 class="text-center mb-4">🔥 Webook Reservation Bot Pro 🔥</h1>

    <div class="row">
        <div class="col-md-6">
            <div class="card p-3">
                <h5>➕ إضافة حسابات</h5>
                <textarea id="accountsInput" rows="4" class="form-control mb-2" placeholder="email:password:captcha:signature&#10;email2:password2::"></textarea>
                <small class="text-muted">الصيغة: إيميل:باسورد:كابتشا:توقيع (يمكن ترك كابتشا وتوقيع فارغين)</small>
                <h5 class="mt-3">🌐 بروكسيات (اختياري)</h5>
                <textarea id="proxiesInput" rows="2" class="form-control mb-2" placeholder="http://user:pass@ip:port&#10;socks5://ip:port"></textarea>
                <div class="row">
                    <div class="col-6"><label>الماكس لكل حساب</label><input type="number" id="maxPerAccount" class="form-control" value="2"></div>
                    <div class="col-6"><label>وضع البوت</label>
                        <select id="modeSelect" class="form-control"><option value="scanner">سكانر (التقاط تلقائي)</option><option value="checker">فاحص (مراقبة فقط)</option></select>
                    </div>
                </div>
                <div class="form-check mt-2"><input type="checkbox" id="soundAlert" class="form-check-input" checked> <label>تنبيه صوتي عند النجاح</label></div>
                <button class="btn btn-primary mt-3" id="saveConfigBtn">💾 حفظ الإعدادات</button>
                <button class="btn btn-success mt-2" id="addAccountsBtn">📥 إضافة الحسابات</button>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3">
                <h5>🎮 التحكم</h5>
                <button class="btn btn-danger" id="startBtn">▶️ تشغيل البوت</button>
                <button class="btn btn-secondary mt-2" id="stopBtn">⏹️ إيقاف</button>
                <hr>
                <h5>📋 الحسابات المُسجلة</h5>
                <div id="accountsList"></div>
            </div>
        </div>
    </div>

    <div class="card p-3 mt-3">
        <h5>📢 سجل الأحداث</h5>
        <div id="logPanel" class="log-container p-2"></div>
    </div>
</div>

<script>
    const socket = io();
    let soundAllowed = true;

    function playBeep() {
        if (!soundAllowed) return;
        const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
        audio.play();
    }

    socket.on('play_sound', () => playBeep());
    socket.on('log', (data) => {
        const div = $('<div>').addClass(`log-${data.type}`).text(`[${new Date().toLocaleTimeString()}] ${data.message}`);
        $('#logPanel').append(div);
        $('#logPanel').scrollTop($('#logPanel')[0].scrollHeight);
    });
    socket.on('update_accounts', (accounts) => {
        let html = '';
        accounts.forEach(acc => {
            html += `<div class="account-row">
                        <strong>${acc.email}</strong> - الحالة: ${acc.status}<br>
                        المقاعد الممسوكة: ${acc.held_seats.length ? acc.held_seats.join(',') : 'لا شيء'} 
                        ${acc.hold_expiry ? `(تنتهي ${new Date(acc.hold_expiry*1000).toLocaleTimeString()})` : ''}
                    </div>`;
        });
        $('#accountsList').html(html || '<p class="text-muted">لا توجد حسابات بعد</p>');
    });
    socket.on('availability', (data) => {
        // يمكن عرضها في مكان آخر
        console.log(`تذاكر متاحة لـ ${data.email}: ${data.available}`);
    });

    $('#saveConfigBtn').click(() => {
        $.post('/api/config', {
            max_per_account: $('#maxPerAccount').val(),
            sound_alerts: $('#soundAlert').is(':checked'),
            mode: $('#modeSelect').val()
        }).done(() => alert('تم حفظ الإعدادات'));
    });

    $('#addAccountsBtn').click(() => {
        const rawAccounts = $('#accountsInput').val().split('\n');
        const accounts = rawAccounts.filter(l => l.trim()).map(l => {
            const parts = l.split(':');
            return {
                email: parts[0].trim(),
                password: parts[1]?.trim() || '',
                captcha: parts[2]?.trim() || '',
                signature: parts[3]?.trim() || ''
            };
        }).filter(a => a.email && a.password);
        const proxies = $('#proxiesInput').val().split('\n').filter(l => l.trim());
        if (accounts.length === 0) {
            alert('الرجاء إدخال حسابات بصيغة صحيحة');
            return;
        }
        $.post('/api/accounts', { accounts, proxies }).done(() => alert('تمت إضافة الحسابات'));
    });

    $('#startBtn').click(() => $.post('/api/start').done(() => alert('بدأ البوت')));
    $('#stopBtn').click(() => $.post('/api/stop').done(() => alert('تم الإيقاف')));
</script>
</body>
  </html>
